<div class="workspace-shell">
  <app-slide-bar></app-slide-bar>

  <section class="page-content">
    <header class="topbar">
      <div>
        <h1>Edit Workspace</h1>
        <p class="subtitle">Modify details and description for this workspace environment</p>
      </div>
    </header>

    <main class="edit-workspace-container">
      <div *ngIf="isLoading" class="loading-state">
        <p>Loading details...</p>
      </div>

      <div *ngIf="!isLoading" class="form-card">
        <!-- Error notifications -->
        <div class="invite-error" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <form (ngSubmit)="onSubmit()" #editWSForm="ngForm" novalidate>
          <div class="form-group">
            <label for="edit-ws-name">WORKSPACE NAME</label>
            <input 
              id="edit-ws-name" 
              type="text" 
              placeholder="e.g. Project Alpha" 
              [(ngModel)]="name" 
              name="name"
              required 
              #nameField="ngModel"
              [disabled]="isSubmitting"
            />
          </div>

          <div class="form-group" style="margin-top: 1.25rem;">
            <label for="edit-ws-desc">DESCRIPTION (OPTIONAL)</label>
            <textarea 
              id="edit-ws-desc" 
              placeholder="What is this workspace about..." 
              [(ngModel)]="description" 
              name="description"
              [disabled]="isSubmitting"
            ></textarea>
          </div>

          <div class="form-actions" style="margin-top: 1.75rem;">
            <button type="button" class="btn-cancel" [routerLink]="['/workspace-detail']" [queryParams]="{ id: workspaceId }">Cancel</button>
            <button type="submit" class="btn-save" [disabled]="editWSForm.invalid || isSubmitting || !name.trim()">
              {{ isSubmitting ? 'Saving...' : 'Save Changes' }}
            </button>
          </div>
        </form>
      </div>
    </main>
  </section>
</div>

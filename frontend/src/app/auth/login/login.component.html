<div class="auth-page">
  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <span class="logo-name">NeuroNote</span>
      <p class="logo-tagline">Deep Work Workspace</p>
    </div>

    <!-- Form -->
    <form class="auth-form" (ngSubmit)="onSubmit(loginForm)" #loginForm="ngForm" novalidate>
      <h2 class="form-title">Welcome back</h2>

      <!-- Server Error -->
      <div class="server-error" *ngIf="errorMessage">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="15" y1="9" x2="9" y2="15"></line>
          <line x1="9" y1="9" x2="15" y2="15"></line>
        </svg>
        {{ errorMessage }}
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="login-email">EMAIL ADDRESS</label>
        <div class="input-wrapper"
             [class.is-valid]="emailField.touched && emailField.valid"
             [class.is-invalid]="emailField.touched && emailField.invalid">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <input
            id="login-email"
            type="email"
            class="form-input"
            placeholder="you@example.com"
            [(ngModel)]="email"
            name="email"
            #emailField="ngModel"
            required
            email
          />
        </div>
        <div class="error-messages" *ngIf="emailField.touched && emailField.invalid">
          <p class="error-msg" *ngIf="emailField.errors?.['required']">
            Email is required.
          </p>
          <p class="error-msg" *ngIf="emailField.errors?.['email']">
            Please enter a valid email address.
          </p>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="login-password">PASSWORD</label>
        <div class="input-wrapper"
             [class.is-valid]="passwordField.touched && passwordField.valid"
             [class.is-invalid]="passwordField.touched && passwordField.invalid">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input
            id="login-password"
            type="password"
            class="form-input"
            placeholder="••••••••"
            [(ngModel)]="password"
            name="password"
            #passwordField="ngModel"
            required
            minlength="8"
          />
        </div>
        <div class="error-messages" *ngIf="passwordField.touched && passwordField.invalid">
          <p class="error-msg" *ngIf="passwordField.errors?.['required']">
            Password is required.
          </p>
          <p class="error-msg" *ngIf="passwordField.errors?.['minlength']">
            Password must be at least 8 characters.
          </p>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-submit" [class.btn-disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Sign in</span>
        <span *ngIf="isLoading" class="btn-loading">Signing in...</span>
      </button>

      <!-- Switch to Register -->
      <p class="auth-switch">
        Don't have an account?
        <a routerLink="/register" class="auth-link">Sign up</a>
      </p>
    </form>
  </div>
</div>

<header class="header">
  <div class="container nav-container">
    <a routerLink="/home" class="logo" (click)="closeMenu()">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-icon">
        <path d="M12 22C12 22 12 13 18 8C19.5 6.5 20 4.5 20 3C18.5 3 16.5 3.5 15 5C10 11 10 18 10 18" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 15C12 15 7.5 12 5.5 8C4.8 6.5 4.8 4.5 5.5 3.5C6.5 2.8 8.5 2.8 10 4.2C13.5 7.7 13 13 13 13" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="logo-text">NeuronNote</span>
    </a>
    
    <!-- Mobile Hamburger Toggle -->
    <button class="menu-toggle" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen" aria-label="Toggle Menu">
      <span class="hamburger-bar" [class.open]="isMenuOpen"></span>
      <span class="hamburger-bar" [class.open]="isMenuOpen"></span>
      <span class="hamburger-bar" [class.open]="isMenuOpen"></span>
    </button>
    
    <!-- Mobile Backdrop Overlay -->
    <div class="nav-overlay" [class.open]="isMenuOpen" (click)="closeMenu()"></div>
    
    <!-- Navigation Links & Actions Wrapper -->
    <div class="nav-menu-wrapper" [class.open]="isMenuOpen">
      <nav class="nav-links">
        <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Home</a>
        <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a>
      </nav>
      
      <div class="nav-actions">
        <a routerLink="/login" class="login-btn" (click)="closeMenu()">Log in</a>
        <a routerLink="/register" class="signup-btn" (click)="closeMenu()">Get Started</a>
      </div>
    </div>
  </div>
</header>
